const CAGED_MAP={E:{color:'#38BDF8',window:4},A:{color:'#A78BFA',window:4},G:{color:'#F59E0B',window:4},C:{color:'#34D399',window:4},D:{color:'#F87171',window:4}};

function getRF(root){
  var m={C:8,'C#':9,D:10,'D#':11,E:0,F:1,'F#':2,G:3,'G#':4,A:5,'A#':6,B:7};
  return m[root]!==undefined?m[root]:0;
}

function getCAGED(root){
  var f=getRF(root);
  var shapes=[{f:0,s:'E'},{f:2,s:'D'},{f:3,s:'C'},{f:5,s:'A'},{f:7,s:'G'},{f:8,s:'E'},{f:10,s:'C'},{f:12,s:'E'}];
  var best=shapes.reduce(function(b,sh){return Math.abs(sh.f-f)<Math.abs(b.f-f)?sh:b;},shapes[0]);
  var color=CAGED_MAP[best.s]?CAGED_MAP[best.s].color:'#A78BFA';
  return {shape:best.s,color:color,windowStart:f,windowEnd:f+3};
}

function getFretWindow(root){return getRF(root);}

var FLAT_KEYS=['F','A#','D#','G#','C#','F#','B'];
var SHARP_KEYS=['G','D','A','E','B','F#','C#'];
var ENH_FLAT={'C#':'Db','D#':'Eb','F#':'Gb','G#':'Ab','A#':'Bb'};
var ENH_SHARP={'Db':'C#','Eb':'D#','Gb':'F#','Ab':'G#','Bb':'A#'};

function enhNote(note,key){
  if(!note||!key)return note;
  var useFlats=FLAT_KEYS.indexOf(key)>=0;
  if(useFlats&&ENH_FLAT[note])return ENH_FLAT[note];
  if(!useFlats&&ENH_SHARP[note])return ENH_SHARP[note];
  return note;
}

function dnKey(note,lang,key){var n=enhNote(note,key);return dn(n,lang,true);}

function dn(note,lang,compact){
  if(!note)return note;
  if(lang!=='fr')return note;
  var fr=NOTE_FR[note]||note;
  if(compact)return fr;
  return fr+' ('+note+')';
}

function n2note(numeral,key){
  if(!numeral||!key)return null;
  var ki=NOTES.indexOf(key);
  if(ki<0)return null;
  var map={'I':0,'II':2,'III':4,'IV':5,'V':7,'VI':9,'VII':11,'i':0,'ii':2,'iii':4,'iv':5,'v':7,'vi':9,'vii':11,'bII':1,'bIII':3,'bVII':10,'bVI':8,'bV':6,'#IV':6};
  var clean=numeral.replace(/7|maj7|min7|m7/g,'');
  var interval=map[clean];
  if(interval===undefined)return null;
  return NOTES[(ki+interval)%12];
}

function getCtones(root,quality){
  var ri=NOTES.indexOf(root);if(ri<0)return [];
  var intervals={maj:[0,4,7],min:[0,3,7],'7':[0,4,7,10],maj7:[0,4,7,11],min7:[0,3,7,10]};
  var ivs=intervals[quality]||intervals.maj;
  return ivs.map(function(iv){return NOTES[(ri+iv)%12];});

function getDiatonic(key){
  var ki=NOTES.indexOf(key);if(ki<0)return [];
  var pattern=[{interval:0,quality:'maj',numeral:'I'},{interval:2,quality:'min',numeral:'ii'},{interval:4,quality:'min',numeral:'iii'},{interval:5,quality:'maj',numeral:'IV'},{interval:7,quality:'maj',numeral:'V'},{interval:9,quality:'min',numeral:'vi'},{interval:11,quality:'min',numeral:'vii'}];
  return pattern.map(function(p){return {root:NOTES[(ki+p.interval)%12],quality:p.quality,numeral:p.numeral};});
}

function getDiatStatus(root,qual,key){
  var diat=getDiatonic(key);
  var match=diat.find(function(c){return c.root===root;});
  if(!match)return 'outside';
  if(match.quality===qual||(match.quality==='maj'&&qual==='maj')||(match.quality==='min'&&qual==='min')||(match.quality==='min'&&qual==='min7')||(match.quality==='maj'&&qual==='maj7')){return 'diatonic';}
  return 'borrowed';
}

function nColor(root,key){
  var status=getDiatStatus(root,'maj',key);
  return status==='diatonic'?'#34D399':status==='borrowed'?'#F59E0B':'#F87171';

function getSugg(history,style){
  var pats=PAT[style]||PAT.pop;
  if(!history||history.length===0){return pats.slice(0,4).map(function(p,i){return {numeral:p.num[0],pattern:p.name,score:1-i*0.15};});}
  var last=history[history.length-1];
  var lastNum=last.numeral||'I';
  var suggestions=[];
  pats.forEach(function(pat){
    var idx=pat.num.indexOf(lastNum);
    if(idx>=0){var next=pat.num[(idx+1)%pat.num.length];var existing=suggestions.find(function(s){return s.numeral===next;});if(existing){existing.score+=0.3;}else{suggestions.push({numeral:next,pattern:pat.name,score:0.6});}}
  });
  if(suggestions.length===0){suggestions=[{numeral:'IV',pattern:'Common move',score:0.5},{numeral:'V',pattern:'Tension',score:0.4},{numeral:'vi',pattern:'Relative minor',score:0.35}];}
